apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-paloalto-template
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: terraform-google-paloalto-template
    source:
      repo: https://github.com/SRT-ISV/terraform-google-paloalto-template.git
      sourceType: git
    version: 0.0.1
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description:
      tagline: This is an auto-generated module.
      detailed: "This module was generated from "
      preDeploy: To deploy this blueprint you must have an active billing account and billing permissions.
    icon: assets/icon.png
    costEstimate:
      description: Blueprint cost details
      url: https://cloud.google.com/products/calculator?id=02fb0c45-cc29-4567-8cc6-f72ac9024add
  content:
    architecture:
      diagramUrl: https://www.link-to-architecture-diagram.com
      description:
        - 1. Architecture description step no. 1
        - 2. Architecture description step no. 2
        - 3. Architecture description step no. N
    documentation:
      - title: Hosting a Static Website
        url: https://cloud.google.com/storage/docs/hosting-static-website
    subBlueprints:
      - name: template
        location: modules/template
    examples:
      - name: simple_example
        location: examples/simple_example
  interfaces:
    variables:
      - name: name_prefix
        description: Prefix for the resource names.
        varType: string
        defaultValue: pa
      - name: template_name
        description: Template name
        varType: string
        defaultValue: t1
      - name: subnetwork_self_link
        description: Subnetwork name
        varType: string
        required: true
        connections:
          - source:
              source: github.com/terraform-google-modules/terraform-google-network
              version: "13.1.0"
            spec:
              outputExpr: subnets_self_links[0]
              inputPath: .
      - name: ilb_ip
        description: IP reserved for Internal Load Balancer
        varType: string
        required: true
        connections:
          - source:
              source: github.com/terraform-google-modules/terraform-google-address
              version: "5.0.0"
            spec:
              outputExpr: addresses[0]
              inputPath: .
      - name: gcp_project_id
        varType: string
        required: true
      - name: region
        varType: string
        defaultValue: us-central1
      - name: zone
        description: For GCE staging, use the GCE zone and the CCFE zone will be inferred.
        varType: string
        defaultValue: us-central1-a
    outputs:
      - name: gateway_ip
        description: IP of the gateway template
      - name: template_id
        description: ID of the instance template
      - name: template_self_link
        description: Self link of the instance template
  requirements:
    roles:
      - level: Project
        roles:
          - roles/owner
    services:
      - cloudresourcemanager.googleapis.com
      - storage-api.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 5.41, < 8"
      - source: hashicorp/google-beta
        version: ">= 5.41, < 8"
